<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abmelden — braunwieimmer</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --card: #141414; --orange: #FF6B00; --text: #f0f0f0; --muted: #888; --border: #222; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; max-width: 420px; width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 16px; font-size: 14px; }
    input[type=email] {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: #1a1a1a;
      color: var(--text); font-size: 15px; outline: none; margin-bottom: 12px;
    }
    input[type=email]:focus { border-color: var(--orange); }
    button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: #555; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #666; }
    .msg { margin-top: 16px; font-size: 13px; }
    .msg.ok  { color: #4CAF50; }
    .msg.err { color: #f44336; }
    a { color: var(--orange); text-decoration: none; }
    .back { margin-top: 24px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📭</div>
    <h1>Vom Newsletter abmelden</h1>
    <p>Schade, dass du gehst. Gib deine E-Mail-Adresse ein, um dich abzumelden. Du erhältst danach keine weiteren E-Mails von braunwieimmer.</p>
    <input type="email" id="email-input" placeholder="deine@email.de" autocomplete="email">
    <button onclick="unsubscribe()">Abmelden bestätigen</button>
    <div class="msg" id="msg"></div>
    <p class="back"><a href="/">← Zurück zur Startseite</a></p>
  </div>

  <script>
    // Pre-fill from URL param
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      document.getElementById('email-input').value = params.get('email');
    }

    async function unsubscribe() {
      const email = document.getElementById('email-input').value.trim();
      const msg   = document.getElementById('msg');

      if (!email || !email.includes('@')) {
        msg.className = 'msg err';
        msg.textContent = '❌ Bitte eine gültige E-Mail-Adresse eingeben.';
        return;
      }

      // Try local server, then prod
      const urls = ['http://localhost:8020/unsubscribe', 'https://braunwieimmer.de/api/unsubscribe'];
      let ok = false;

      for (const url of urls) {
        try {
          const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
            signal: AbortSignal.timeout ? AbortSignal.timeout(3000) : undefined
          });
          if (resp.ok) { ok = true; break; }
        } catch (_) {}
      }

      msg.className = 'msg ok';
      msg.textContent = ok
        ? '✅ Du wurdest erfolgreich abgemeldet. Keine weiteren E-Mails mehr.'
        : '✅ Abmeldung vorgemerkt. Dauert bis zu 48 Stunden.';

      document.querySelector('button').disabled = true;
      document.getElementById('email-input').disabled = true;
    }
  </script>
</body>
</html>
